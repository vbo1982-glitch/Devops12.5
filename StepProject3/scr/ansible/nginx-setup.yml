---
- name: Configure Nginx as Reverse Proxy for Jenkins
  hosts: jenkins_master
  become: yes
  tasks:
    - name: 1. Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: 2. Create Nginx configuration for Jenkins
      copy:
        dest: /etc/nginx/sites-available/jenkins
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:8080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

    - name: 3. Enable Jenkins site
      file:
        src: /etc/nginx/sites-available/jenkins
        dest: /etc/nginx/sites-enabled/jenkins
        state: link

    - name: 4. Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: 5. Restart and enable Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes