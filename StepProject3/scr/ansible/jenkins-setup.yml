---
- name: Setup Jenkins Master
  hosts: jenkins_master
  become: yes
  tasks:
    - name: 1. Update apt cache and install dependencies
      apt:
        update_cache: yes
        name:
          - wget
          - curl
          - net-tools
        state: present

    - name: 2. Install Java 17 (Jenkins requirement)
      apt:
        name: openjdk-17-jre
        state: present

    - name: 3. Download Jenkins .deb package
      get_url:
        url: https://get.jenkins.io/debian-stable/jenkins_2.452.3_all.deb
        dest: /tmp/jenkins_2.452.3_all.deb

    - name: 4. Install Jenkins from .deb
      apt:
        deb: /tmp/jenkins_2.452.3_all.deb
        state: present

    - name: 5. Start and enable Jenkins service
      systemd:
        name: jenkins
        state: started
        enabled: yes